<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">

        <input type="text" id="display"/>

        <h3 id="h3">hello abhishek please delete me </h3>
<button id="delete" onclick="deleteH3()">delete h3</button>
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">/</button>


            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">*</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>
            
            
            <button id="1" onclick="appendValue('1')">1</button>
            <button id="2" onclick="appendValue('2')">2</button>
            <button id="3" onclick="appendValue('3')">3</button>
            <button id="+" onclick="appendValue('+')">+</button>
            
            
            <button class="zero" onclick="appendValue('0')">0</button>
            <button class="dot" onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>
    <script src="script.js" defer></script>
</body>
</html>
