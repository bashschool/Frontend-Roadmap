<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="min-h-screen bg-gray-100 p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">My Kanban Board</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-gray-200 rounded-xl p-4">
                <h2 class="font-semibold text-gray-700 mb-3">To Do</h2>
                <div id="todo" class="task-list space-y-3 min-h-[140px]"></div>
            </div>


            <div class="bg-yellow-200 rounded-xl p-4">
                <h2 class="font-semibold text-gray-700 mb-3">In Progress</h2>
                <div id="inprogress" class="task-list space-y-3 min-h-[140px]"></div>
            </div>


            <div class="bg-green-200 rounded-xl p-4">
                <h2 class="font-semibold text-gray-700 mb-3">Done</h2>
                <div id="done" class="task-list space-y-3 min-h-[140px]"></div>
            </div>

        </div>

    </div>

    <script src="script.js" defer></script>
</body>
</html>
